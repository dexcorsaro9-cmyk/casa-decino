<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,sans-serif;background:#f5f4f0;color:#1a1a18;font-size:14px}
    #app{max-width:900px;margin:0 auto}
    .hdr{background:#fff;border-bottom:1px solid #ddd;padding:15px;position:sticky;top:0;z-index:10}
    .brand{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .weather-box{font-size:11px;color:#666;margin-top:5px}
    .tabs{display:flex;gap:5px;overflow-x:auto}
    .tab{padding:8px;border:none;background:#eee;border-radius:6px;cursor:pointer;flex-shrink:0}
    .tab.active{background:#378ADD;color:#fff}
    .content{padding:20px}
    .ev-card{background:#fff;padding:10px;margin-bottom:8px;border-radius:8px;border:1px solid #eee;cursor:pointer}
    #modal-ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);align-items:center;justify-content:center}
    .modal{background:#fff;padding:20px;border-radius:12px;width:90%;max-width:400px}
    input,select,textarea{width:100%;margin:10px 0;padding:8px}
  </style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="brand">
      <div><h2>Casa Decino</h2><div id="weather-widget" class="weather-box">Caricamento meteo...</div></div>
      <button class="add-btn" onclick="openModal()">＋ Aggiungi</button>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchView('today')">Oggi</button>
      <button class="tab" onclick="switchView('week')">Settimana</button>
      <button class="tab" onclick="switchView('month')">Mese</button>
    </div>
  </div>
  <div id="view" class="content"></div>
  <div id="modal-ov"><div class="modal" id="modal-box"></div></div>
</div>

<script>
const d_now = new Date();
const REAL_TODAY = `${d_now.getFullYear()}-${String(d_now.getMonth() + 1).padStart(2, '0')}-${String(d_now.getDate()).padStart(2, '0')}`;
let viewDate = REAL_TODAY;
let events = [], view = 'today';
const API_EVENTS = 'https://sheetdb.io/api/v1/zvwyy4hugc3je';

async function loadEvents() {
  const res = await fetch(API_EVENTS);
  const data = await res.json();
  events = data.map(row => ({
    id: row.ID, title: row.Titolo, date: row.Data, 
    startTime: row['Ora Inizio'], endTime: row['Ora Fine'],
    members: (row.Membro || '').split(',').map(s=>s.trim())
  }));
  renderView();
}

async function loadWeather() {
  try {
    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=41.99&longitude=12.72&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Europe%2FRome&forecast_days=3');
    const data = await res.json();
    const codes = {0:'☀️',1:'🌤',2:'⛅',3:'☁️',51:'🌧',61:'☔',71:'❄️',95:'⛈'};
    let html = '';
    for(let i=0; i<3; i++) html += `<span>${['Oggi','Dom','Dop'][i]}:${codes[data.daily.weathercode[i]]||'☁️'} ${Math.round(data.daily.temperature_2m_max[i])}° </span>`;
    document.getElementById('weather-widget').innerHTML = html;
  } catch(e) { document.getElementById('weather-widget').innerText = "Meteo non disp."; }
}

function renderView() {
  const el = document.getElementById('view');
  if(view === 'today') {
    const todayEvs = events.filter(e => e.date === viewDate);
    el.innerHTML = `<h3>${viewDate}</h3>` + todayEvs.map(e => `<div class="ev-card" onclick="openModal('${e.id}')">${e.startTime} - ${e.title}</div>`).join('');
  } else {
    el.innerHTML = "Vista in aggiornamento...";
  }
}

function switchView(v) { view = v; renderView(); }
function openModal(id) { document.getElementById('modal-ov').style.display = 'flex'; }
function closeModal() { document.getElementById('modal-ov').style.display = 'none'; }

loadEvents();
loadWeather();
</script>
</body>
</html>
