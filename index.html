<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --a-bg:#E6F1FB;--a-txt:#0C447C;--a-dot:#378ADD;
      --p-bg:#FAECE7;--p-txt:#712B13;--p-dot:#D85A30;
      --v-bg:#E1F5EE;--v-txt:#085041;--v-dot:#1D9E75;
      --f-bg:#DAEEFF;--f-txt:#0B5A7A;--f-dot:#29B8E0;
      --s-bg:#EEEDFE;--s-txt:#3C3489;--s-dot:#7F77DD;
    }
    @media(prefers-color-scheme:dark){:root{
      --a-bg:#042C53;--a-txt:#B5D4F4;
      --p-bg:#4A1B0C;--p-txt:#F5C4B3;
      --v-bg:#04342C;--v-txt:#9FE1CB;
      --f-bg:#041C28;--f-txt:#9DD9F0;
      --s-bg:#26215C;--s-txt:#CECBF6;
    }}
    body{font-family:system-ui,-apple-system,sans-serif;background:var(--color-background-tertiary,#f5f4f0);color:var(--color-text-primary,#1a1a18);font-size:14px}
    #app{position:relative;min-height:600px;max-width:900px;margin:0 auto}
    .hdr{background:var(--color-background-primary,#fff);border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.12));padding:14px 20px 0;position:sticky;top:0;z-index:10}
    .hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .brand{display:flex;align-items:center;gap:10px}
    .brand-icon{width:36px;height:36px;border-radius:10px;background:var(--a-bg);color:var(--a-txt);display:flex;align-items:center;justify-content:center;font-size:18px}
    .brand-name{font-size:17px;font-weight:600;letter-spacing:-.01em}
    .brand-sub{font-size:11px;color:var(--color-text-secondary,#888);margin-top:1px;margin-bottom:4px}
    .weather-box{font-weight:500;color:var(--color-text-secondary,#888);background:var(--color-background-secondary,#f0efeb);padding:4px 8px;border-radius:6px;display:none;font-size:10.5px;border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.08))}
    .w-day{display:inline-block;margin-right:8px}
    .w-day:last-child{margin-right:0}
    .add-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:0.5px solid var(--color-border-secondary,rgba(0,0,0,.25));background:var(--color-background-primary,#fff);cursor:pointer;font-size:13px;font-weight:500;color:var(--color-text-primary,#1a1a18);transition:background .1s;white-space:nowrap}
    .add-btn:hover{background:var(--color-background-secondary,#f0efeb)}
    .tabs{display:flex;gap:2px;overflow-x:auto}
    .tab{padding:8px 13px;font-size:12px;border:none;background:none;cursor:pointer;border-radius:8px 8px 0 0;color:var(--color-text-secondary,#888);font-weight:400;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px;flex-shrink:0}
    .tab.active{color:var(--color-text-primary,#1a1a18);font-weight:600;background:var(--color-background-secondary,#f0efeb)}
    .filters{background:var(--color-background-secondary,#f0efeb);padding:10px 20px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.12))}
    .pill{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:opacity .15s,transform .1s;user-select:none}
    .pill:hover{transform:scale(1.03)}
    .pill.off{opacity:.28}
    .dot8{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .content{padding:16px 20px 80px}
    .sec-lbl{font-size:11px;color:var(--color-text-secondary,#888);letter-spacing:.06em;margin-bottom:14px;font-weight:600;text-transform:uppercase;display:flex;align-items:center;gap:6px}
    .mem-sec{margin-bottom:22px;background:var(--color-background-primary,#fff);border-radius:12px;border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.12));overflow:hidden}
    .mem-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.12))}
    .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
    .mem-body{padding:8px 14px 10px}
    .no-ev{font-size:12px;color:var(--color-text-tertiary,#aaa);padding:6px 0;display:flex;align-items:center;gap:6px}
    .ev-card{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;border-radius:8px;background:var(--color-background-secondary,#f5f4f0);margin-bottom:6px;cursor:pointer;transition:background .1s;position:relative}
    .ev-card:hover{background:var(--color-background-tertiary,#ece9e1)}
    .ev-strip{width:3px;border-radius:2px;align-self:stretch;flex-shrink:0;min-height:36px}
    .ev-time{font-size:11px;color:var(--color-text-secondary,#888);min-width:58px;padding-top:1px;line-height:1.7;flex-shrink:0}
    .ev-info{flex:1;min-width:0}
    .ev-title{font-size:13px;font-weight:600;margin-bottom:5px;line-height:1.3}
    .ev-meta{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
    .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap}
    .ev-note{font-size:11px;color:var(--color-text-secondary,#888);margin-top:5px;display:flex;align-items:center;gap:5px}
    .del-btn{background:none;border:none;cursor:pointer;color:var(--color-text-secondary,#888);padding:4px 6px;border-radius:4px;position:absolute;top:6px;right:6px;opacity:0;transition:opacity .15s;font-size:14px;line-height:1}
    .ev-card:hover .del-btn{opacity:.45}
    .del-btn:hover{opacity:1!important;color:#e24b4a}
    .nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;background:var(--color-background-primary,#fff);padding:10px 14px;border-radius:10px;border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.12))}
    .nav-lbl{font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px}
    .nav-btn{background:none;border:0.5px solid var(--color-border-secondary,rgba(0,0,0,.25));border-radius:6px;cursor:pointer;padding:4px 12px;color:var(--color-text-primary,#1a1a18);font-size:16px;transition:background .1s;line-height:1.4}
    .nav-btn:hover{background:var(--color-background-secondary,#f0efeb)}
    .wk-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px}
    .day-col{min-height:220px}
    .day-hdr{text-align:center;padding:7px 4px 5px;border-radius:8px;margin-bottom:8px;background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.12))}
    .day-hdr.td{background:var(--color-background-info,#e6f1fb);border-color:var(--color-border-info,#378ADD)}
    .d-name{font-size:10px;color:var(--color-text-secondary,#888);display:block;margin-bottom:2px;font-weight:500}
    .d-num{font-size:16px;font-weight:700;display:block}
    .day-hdr.td .d-num{color:var(--color-text-info,#0C447C)}
    .wk-bday{font-size:9px;margin-top:3px;display:block;background:rgba(239,159,39,.15);color:#633806;padding:1px 4px;border-radius:3px}
    .wk-ev{padding:5px 7px;border-radius:6px;font-size:10px;margin-bottom:3px;cursor:pointer;line-height:1.4;border:0.5px solid rgba(0,0,0,.08)}
    .wk-ev-name{font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .wk-ev-time{display:block;opacity:.75}
    .wk-add{width:100%;margin-top:4px;padding:5px;border-radius:6px;border:0.5px dashed var(--color-border-secondary,rgba(0,0,0,.25));background:none;cursor:pointer;color:var(--color-text-tertiary,#aaa);font-size:14px;transition:all .15s;line-height:1}
    .wk-add:hover{background:var(--color-background-secondary,#f0efeb);color:var(--color-text-secondary,#888)}
    .mn-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.12));border-radius:10px;overflow:hidden}
    .mn-dh{text-align:center;padding:8px;font-size:10px;color:var(--color-text-secondary,#888);background:var(--color-background-secondary,#f0efeb);border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.12));font-weight:600}
    .mn-day{min-height:74px;padding:5px;background:var(--color-background-primary,#fff);border-right:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.12));border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.12));cursor:pointer;transition:background .1s}
    .mn-day:hover{background:var(--color-background-secondary,#f0efeb)}
    .mn-day.td{background:var(--color-background-info,#e6f1fb)}
    .mn-day.other{opacity:.3}
    .mn-dn{font-size:12px;font-weight:600;margin-bottom:4px;display:block}
    .mn-day.td .mn-dn{color:var(--color-text-info,#0C447C)}
    .dots{display:flex;flex-wrap:wrap;gap:2px}
    .mn-dot{width:7px;height:7px;border-radius:50%;cursor:pointer;flex-shrink:0}
    .mn-dot-r{width:7px;height:7px;border-radius:2px;flex-shrink:0}
    .mn-more{font-size:9px;color:var(--color-text-secondary,#888);margin-top:3px;font-weight:500}
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:20px}
    .stat-card{border-radius:10px;padding:12px 14px;border:0.5px solid rgba(0,0,0,.08);display:flex;flex-direction:column;gap:4px}
    .stat-num{font-size:22px;font-weight:700}
    .stat-lbl{font-size:10px;opacity:.75}
    .bday-banner{border-radius:10px;padding:13px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;border:0.5px solid rgba(0,0,0,.08)}
    .tr-day-hdr{font-size:12px;font-weight:600;margin-bottom:8px;padding-bottom:4px;border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.12))}
    .empty-state{text-align:center;padding:48px 20px;color:var(--color-text-tertiary,#aaa)}
    .empty-state .big{font-size:40px;display:block;margin-bottom:12px}
    #modal-ov{display:none;position:absolute;top:0;left:0;width:100%;background:rgba(0,0,0,.45);z-index:999;padding:24px 16px;align-items:flex-start;justify-content:center}
    .modal{background:var(--color-background-primary,#fff);border-radius:14px;border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.12));width:100%;max-width:460px;padding:20px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
    .modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:14px;border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.12))}
    .modal-ttl{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
    .cl-btn{background:none;border:0.5px solid var(--color-border-secondary,rgba(0,0,0,.25));border-radius:6px;cursor:pointer;color:var(--color-text-secondary,#888);padding:3px 10px;font-size:16px;transition:background .1s;line-height:1.5}
    .cl-btn:hover{background:var(--color-background-secondary,#f0efeb)}
    .fgrp{margin-bottom:12px}
    .flbl{display:block;font-size:10px;color:var(--color-text-secondary,#888);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .t-row{display:flex;gap:6px;align-items:center}
    input,select,textarea{font-family:inherit;font-size:13px;color:var(--color-text-primary,#1a1a18);background:var(--color-background-secondary,#f5f4f0);border:0.5px solid var(--color-border-secondary,rgba(0,0,0,.25));border-radius:7px;padding:8px 10px;width:100%;transition:border .15s}
    input:focus,select:focus,textarea:focus{outline:none;border-color:#0C447C;box-shadow:0 0 0 2px rgba(56,138,221,.15)}
    .tr-sec{border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.12));border-radius:9px;padding:12px;margin-bottom:12px;background:var(--color-background-secondary,#f5f4f0)}
    .tr-lbl{font-size:10px;color:var(--color-text-secondary,#888);font-weight:700;margin-bottom:8px;display:block;text-transform:uppercase;letter-spacing:.05em}
    .tr-opts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
    .tr-btn{padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:0.5px solid var(--color-border-secondary,rgba(0,0,0,.25));background:var(--color-background-primary,#fff);color:var(--color-text-secondary,#888);font-family:inherit;transition:all .12s;display:flex;align-items:center;gap:5px;font-weight:500}
    .tr-btn.sel{background:var(--a-bg);color:var(--a-txt);border-color:var(--a-dot);font-weight:700}
    .modal-actions{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:14px;border-top:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.12))}
    .btn-del-ev{background:none;border:none;cursor:pointer;color:#a32d2d;font-size:12px;font-family:inherit;display:flex;align-items:center;gap:4px;padding:5px 8px;border-radius:6px;font-weight:500}
    .btn-del-ev:hover{background:#fcebeb}
    .btn-row{display:flex;gap:8px}
    .btn-cancel{background:none;border:0.5px solid var(--color-border-secondary,rgba(0,0,0,.25));border-radius:7px;padding:8px 16px;cursor:pointer;font-size:13px;font-family:inherit;color:var(--color-text-secondary,#888)}
    .btn-save{background:var(--a-bg);border:none;border-radius:7px;padding:8px 20px;cursor:pointer;font-size:13px;font-family:inherit;color:var(--a-txt);font-weight:700;transition:opacity .15s}
    .btn-save:hover{opacity:.8}
    .empty-week{text-align:center;padding:20px 0;color:var(--color-text-tertiary,#aaa);font-size:16px}
  </style>
</head>
<body>
<div id="app">
  <div id="main">
    <div class="hdr">
      <div class="hdr-top">
        <div class="brand">
          <div class="brand-icon">🏠</div>
          <div>
            <div class="brand-name">Casa Decino</div>
            <div class="brand-sub">Agenda di famiglia</div>
            <div id="weather-widget" class="weather-box"></div>
          </div>
        </div>
        <button class="add-btn" id="hdr-add" onclick="hdrAdd()">＋ <span id="hdr-add-lbl">Aggiungi evento</span></button>
      </div>
      <div class="tabs">
        <button class="tab active" id="t-today"    onclick="switchView('today')">📅 Oggi</button>
        <button class="tab" id="t-week"       onclick="switchView('week')">🗓 Settimana</button>
        <button class="tab" id="t-month"      onclick="switchView('month')">📆 Mese</button>
        <button class="tab" id="t-trasporti"  onclick="switchView('trasporti')">🚗 Trasporti</button>
        <button class="tab" id="t-ricorrenze" onclick="switchView('ricorrenze')">🎂 Ricorrenze</button>
      </div>
    </div>
    <div class="filters" id="filters"></div>
    <div class="content" id="view"></div>
  </div>
  <div id="modal-ov"><div class="modal" id="modal-box"></div></div>
</div>

<script>
const d_now = new Date();
const TODAY = `${d_now.getFullYear()}-${String(d_now.getMonth() + 1).padStart(2, '0')}-${String(d_now.getDate()).padStart(2, '0')}`;

const MEMBERS=[
  {id:'antonio',name:'Antonio',role:'Papà',      dot:'#378ADD',bg:'var(--a-bg)',txt:'var(--a-txt)',icon:'👨'},
  {id:'pamela', name:'Pamela', role:'Mamma',      dot:'#D85A30',bg:'var(--p-bg)',txt:'var(--p-txt)',icon:'👩'},
  {id:'valerio',name:'Valerio',role:'Figlio 22a', dot:'#1D9E75',bg:'var(--v-bg)',txt:'var(--v-txt)',icon:'⚽'},
  {id:'federico',name:'Federico',role:'Figlio 14a',dot:'#29B8E0',bg:'var(--f-bg)',txt:'var(--f-txt)',icon:'🚴'},
  {id:'sara',   name:'Sara',   role:'Figlia 14a', dot:'#7F77DD',bg:'var(--s-bg)',txt:'var(--s-txt)',icon:'💃'},
];
const CATS=[
  {id:'scuola',    label:'Scuola',     icon:'🎓'},
  {id:'universita',label:'Università', icon:'🏛'},
  {id:'lavoro',    label:'Lavoro',     icon:'💼'},
  {id:'sport',     label:'Sport',      icon:'🏃'},
  {id:'altro',     label:'Altro',      icon:'📌'},
];
const TRANS=[
  {id:'autonomous', label:'Autonomo',       icon:'✅'},
  {id:'accompanied',label:'Accompagnato da',icon:'🚗'},
  {id:'external',   label:'Aiuto esterno',  icon:'📞'},
];
const RIC_TYPES=[
  {id:'birthday',   label:'Compleanno', icon:'🎂'},
  {id:'anniversary',label:'Anniversario',icon:'💍'},
  {id:'other',      label:'Altro',      icon:'⭐'},
];
const MONTHS_IT=['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];

const SAMPLE_EVENTS=[];
const SAMPLE_RIC=[];

let events=[],ricorrenze=[];
let view='today',filters=MEMBERS.map(m=>m.id);
let wkStart=weekStart(new Date(TODAY)),curMonth=new Date(TODAY);
var editId=null,form={},ricEditId=null,ricForm={};

const API_EVENTS = 'https://sheetdb.io/api/v1/zvwyy4hugc3je';

function weekStart(d){const dt=new Date(d);const dy=dt.getDay();dt.setDate(dt.getDate()+(dy===0?-6:1-dy));dt.setHours(0,0,0,0);return dt;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}

function fmtD(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dy = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dy}`;
}

function M(id){return MEMBERS.find(m=>m.id===id)||MEMBERS[0];}
function C(id){return CATS.find(c=>c.id===id)||CATS[4];}
function ms(m){return `background:${m.bg};color:${m.txt}`;}
function uid(){return 'e'+Date.now()+Math.random().toString(36).slice(2,5);}
function daysUntil(md){
  const[mm,dd]=md.split('-').map(Number);
  const today=new Date(TODAY),yr=today.getFullYear();
  let next=new Date(yr,mm-1,dd);
  if(fmtD(next)<TODAY)next=new Date(yr+1,mm-1,dd);
  return Math.round((next-today)/86400000);
}
function fmtMD(md){const[mm,dd]=md.split('-').map(Number);return `${dd} ${MONTHS_IT[mm-1]}`;}

/* --- CONNESSIONE EVENTI A GOOGLE SHEETS VIA SHEETDB --- */
async function loadEvents(){
  try {
    const res = await fetch(API_EVENTS);
    const data = await res.json();
    if(data && data.length > 0 && data[0].ID) {
        events = data.map(row => ({
            id: row.ID,
            title: row.Titolo,
            date: row.Data,
            startTime: row['Ora Inizio'],
            endTime: row['Ora Fine'],
            members: (row.Membro || '').split(',').map(s=>s.trim()).filter(Boolean),
            category: row.Categoria,
            transport: { type: row['Trasporto Tipo'], by: row['Trasporto Da'], note: row['Trasporto Note'] },
            notes: row.Note
        }));
    } else { events = []; }
  } catch(e) { 
    console.error("Errore download eventi:", e);
    events = []; 
  }
}

async function saveEvt(){
  if(!window.form.title.trim()){alert('Inserisci un titolo per l\'evento');return;}
  if(!window.form.date){alert('Seleziona una data');return;}
  if(window.form.members.length === 0){alert('Seleziona almeno una persona coinvolta!');return;}

  const isEdit = !!editId;
  const evId = isEdit ? editId : uid();

  const newRow = {
    ID: evId,
    Titolo: window.form.title,
    Data: window.form.date,
    "Ora Inizio": window.form.startTime,
    "Ora Fine": window.form.endTime,
    Membro: window.form.members.join(','),
    Categoria: window.form.category,
    "Trasporto Tipo": window.form.transport.type,
    "Trasporto Da": window.form.transport.by,
    "Trasporto Note": window.form.transport.note,
    Note: window.form.notes
  };

  if(isEdit){
    const i = events.findIndex(e=>e.id===editId);
    if(i>-1) events[i] = {...window.form, id: editId};
    fetch(`${API_EVENTS}/ID/${editId}`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({data: newRow})
    });
  } else {
    events.push({...window.form, id: evId});
    fetch(API_EVENTS, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({data: newRow})
    });
  }
  closeModal();
  renderView();
}

async function delEvt(id){
  if(!confirm('Eliminare questo evento per tutte le persone coinvolte?'))return;
  events = events.filter(e=>e.id!==id);
  fetch(`${API_EVENTS}/ID/${id}`, { method: 'DELETE' });
  closeModal();
  renderView();
}

/* --- RICORRENZE VIA SHEETDB (NUOVO FOGLIO "Ricorrenze") --- */
async function loadRic(){
  try {
    const res = await fetch(API_EVENTS + '?sheet=Ricorrenze');
    const data = await res.json();
    if(data && data.length > 0 && data[0].ID) {
        ricorrenze = data.map(row => ({
            id: row.ID,
            title: row.Titolo,
            date: row.Data,
            type: row.Tipo,
            member: row.Membro || ''
        }));

/* --- INTEGRAZIONE METEO 3 GIORNI SICURA (CAP 00012) --- */
async function loadWeather() {
  try {
    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=41.99&longitude=12.72&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Europe%2FRome&forecast_days=3');
    if (!res.ok) throw new Error("API Meteo non raggiungibile");
    const data = await res.json();
    if (!data.daily || !data.daily.weathercode) return;

    const d = data.daily;
    const codes = {
      0: '☀️', 1: '🌤', 2: '⛅', 3: '☁️', 
      45: '🌫', 48: '🌫', 
      51: '🌧', 53: '🌧', 55: '🌧', 
      61: '☔', 63: '☔', 65: '☔', 
      71: '❄️', 73: '❄️', 75: '❄️', 
      95: '⛈', 96: '⛈', 99: '⛈'
    };
    
    const lbls = ['Oggi', 'Dom', 'Dop'];
    let html = '';
    for(let i=0; i<3; i++) {
      const ic = codes[d.weathercode[i]] || '☁️';
      const max = Math.round(d.temperature_2m_max[i]);
      const min = Math.round(d.temperature_2m_min[i]);
      html += `<span class="w-day"><b>${lbls[i]}</b> ${ic} ${max}°/${min}°</span>`;
    }
    
    const widget = document.getElementById('weather-widget');
    widget.innerHTML = html;
    widget.style.display = 'inline-block';
  } catch (error) {
    document.getElementById('weather-widget').style.display = 'none';
  }
}

function weekView(){

  const end=addDays(wkStart,6);
  const lbl=wkStart.toLocaleDateString('it-IT',{day:'numeric',month:'short'})+' — '+end.toLocaleDateString('it-IT',{day:'numeric',month:'short',year:'numeric'});

    <button class="nav-btn" onclick="wkStart=addDays(wkStart,7);renderView()">›</button>
  </div><div class="wk-grid">`;
  for(let i=0;i<7;i++){
    const d=addDays(wkStart,i);const ds=fmtD(d);const it=ds===TODAY;
    const de=events.filter(e=>e.date===ds && e.members.some(m=>filters.includes(m))).sort((a,b)=>a.startTime.localeCompare(b.startTime));
    const ric=ricorrenze.filter(r=>r.date===ds.slice(5));

    h+=`<div class="day-col"><div class="day-hdr${it?' td':''}"><span class="d-name">${DAYS[i]}</span><span class="d-num">${d.getDate()}</span>${ricBadge}</div>`;
    if(!de.length)h+=`<div class="empty-week">·</div>`;
    de.forEach(e=>{

        }
      });
    });
    h+=`<button class="wk-add" onclick="openModalForDate('${ds}')">＋</button></div>`;
  }
  return h+'</div>';
}

/* ── MONTH ── */
function monthView(){
  const yr=curMonth.getFullYear(),mo=curMonth.getMonth();
  const mn=curMonth.toLocaleDateString('it-IT',{month:'long',year:'numeric'});
  const fd=new Date(yr,mo,1),ld=new Date(yr,mo+1,0);
  let dow=fd.getDay()-1;if(dow<0)dow=6;
  const DAYS=['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
  let h=`<div class="nav-row">
    <button class="nav-btn" onclick="curMonth=new Date(curMonth.getFullYear(),curMonth.getMonth()-1,1);renderView()">‹</button>
    <span class="nav-lbl">📆 ${mn.charAt(0).toUpperCase()+mn.slice(1)}</span>
    <button class="nav-btn" onclick="curMonth=new Date(curMonth.getFullYear(),curMonth.getMonth()+1,1);renderView()">›</button>
  </div><div class="mn-grid">`;
  DAYS.forEach(d=>{h+=`<div class="mn-dh">${d}</div>`;});
  for(let i=0;i<dow;i++){const d2=new Date(fd);d2.setDate(fd.getDate()-(dow-i));h+=mnDay(d2,true);}
  for(let d=1;d<=ld.getDate();d++){h+=mnDay(new Date(yr,mo,d),false);}
  const tot=dow+ld.getDate(),rem=(7-tot%7)%7;
  for(let i=1;i<=rem;i++){const d2=new Date(ld);d2.setDate(ld.getDate()+i);h+=mnDay(d2,true);}
  return h+'</div>';
}
function mnDay(date,other){
  const ds=fmtD(date),it=ds===TODAY;
  const de=events.filter(e=>e.date===ds && e.members.some(m=>filters.includes(m)));
  const ric=ricorrenze.filter(r=>r.date===ds.slice(5));
  
  let dots = [];
  de.forEach(e => {
    e.members.forEach(mid => {
      if(filters.includes(mid)) dots.push({mid, eId: e.id, title: e.title});
    });
  });
  
  const visDots = dots.slice(0, 5);
  const more = dots.length - visDots.length;

  let h=`<div class="mn-day${it?' td':''}${other?' other':''}" onclick="openModalForDate('${ds}')">
    <span class="mn-dn">${date.getDate()}</span><div class="dots">`;
  
  visDots.forEach(d => {
    const m = M(d.mid);
    h+=`<span class="mn-dot" style="background:${m.dot}" onclick="event.stopPropagation();openModal('${d.eId}')" title="${m.name} — ${d.title}"></span>`;
  });
  
  ric.forEach(r=>{const mb=r.member?M(r.member):null;h+=`<span class="mn-dot-r" style="background:${mb?mb.dot:'#EF9F27'}" title="${r.title}"></span>`;});
  h+=`</div>${more>0?`<div class="mn-more">+${more}</div>`:''}</div>`;
  return h;
}

      <div class="t-row">
        <input type="time" value="${form.startTime}" onchange="window.form.startTime=this.value">
        <span style="color:var(--color-text-secondary,#888);font-size:12px;flex-shrink:0">→</span>
        <input type="time" value="${form.endTime}" onchange="window.form.endTime=this.value">
      </div>
    </div>
    
    <div class="tr-sec"><span class="tr-lbl">🚗 Trasporto & supporto</span><div class="tr-opts">${tBtns}</div>${trD}</div>
    <div class="fgrp"><label class="flbl">Note</label><textarea rows="2" oninput="window.form.notes=this.value" placeholder="Promemoria, materiale…" style="resize:none">${form.notes||''}</textarea></div>
    <div class="modal-actions">
      ${editId?`<button class="btn-del-ev" onclick="delEvt('${editId}')">🗑 Elimina</button>`:'<span></span>'}
      <div class="btn-row"><button class="btn-cancel" onclick="closeModal()">Annulla</button><button class="btn-save" onclick="saveEvt()">✓ Salva</button></div>
    </div>`;
}

function toggleMbr(id){
  if(form.members.includes(id)){
    if(form.members.length > 1) form.members = form.members.filter(x => x !== id);
  } else {
    form.members.push(id);
  }
  renderEvModal();
}
function setTr(t){form.transport={type:t,by:'',note:''};renderEvModal();}

/* ── RICORRENZA MODAL ── */
function openRicModal(id){
  ricEditId=id;
  if(id){const r=ricorrenze.find(ri=>ri.id===id);if(!r)return;ricForm={...r};}
  else ricForm={id:'',title:'',date:'06-01',type:'birthday',member:''};
  renderRicModal();showOv();
}
function renderRicModal(){
  const tBtns=RIC_TYPES.map(t=>`<button class="tr-btn${ricForm.type===t.id?' sel':''}" onclick="ricForm.type='${t.id}';renderRicModal()">${t.icon} ${t.label}</button>`).join('');
  const mOpts=`<option value="">— nessuno —</option>`+MEMBERS.map(m=>`<option value="${m.id}"${ricForm.member===m.id?' selected':''}>${m.icon} ${m.name}</option>`).join('');
  document.getElementById('modal-box').innerHTML=`
    <div class="modal-hdr">
      <div class="modal-ttl"><span style="font-size:20px">🎂</span> ${ricEditId?'Modifica ricorrenza':'Nuova ricorrenza'}</div>
      <button class="cl-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="fgrp"><label class="flbl">Titolo</label><input type="text" value="${ricForm.title.replace(/"/g,'&quot;')}" oninput="ricForm.title=this.value" placeholder="Es. Compleanno Nonna Rosa"></div>
    <div class="fgrp"><label class="flbl">Tipo</label><div class="tr-opts">${tBtns}</div></div>
    <div class="fgrp"><label class="flbl">Data (giorno e mese — si ripete ogni anno)</label><input type="date" value="2026-${ricForm.date}" onchange="ricForm.date=this.value.slice(5)"></div>
    <div class="fgrp"><label class="flbl">Membro famiglia (opzionale)</label><select onchange="ricForm.member=this.value">${mOpts}</select></div>
    <div class="modal-actions">
      ${ricEditId?`<button class="btn-del-ev" onclick="deleteRic('${ricEditId}')">🗑 Elimina</button>`:'<span></span>'}
      <div class="btn-row"><button class="btn-cancel" onclick="closeModal()">Annulla</button><button class="btn-save" onclick="saveRicorrenza()">✓ Salva</button></div>
    </div>`;
}
async function saveRicorrenza(){
  if(!ricForm.title.trim()){alert('Inserisci un titolo');return;}

  const isEdit = !!ricEditId;
  const rId = isEdit ? ricEditId : uid();

  const newRow = {
    ID: rId,
    Titolo: ricForm.title,
    Data: ricForm.date,
    Tipo: ricForm.type,
    Membro: ricForm.member || ''
  };

  if(isEdit){
    const i = ricorrenze.findIndex(r=>r.id===ricEditId);
    if(i>-1) ricorrenze[i] = {...ricForm, id: ricEditId};
    fetch(`${API_EVENTS}/ID/${ricEditId}?sheet=Ricorrenze`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({data: newRow})
    });
  } else {
    ricorrenze.push({...ricForm, id: rId});
    fetch(`${API_EVENTS}?sheet=Ricorrenze`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({data: newRow})
    });
  }
  
  closeModal();
  renderView();
}
async function deleteRic(id){
  if(!confirm('Eliminare questa ricorrenza?'))return;
  ricorrenze = ricorrenze.filter(r=>r.id!==id);
  fetch(`${API_EVENTS}/ID/${id}?sheet=Ricorrenze`, { method: 'DELETE' });
  closeModal();
  renderView();
}

async function init(){
  await Promise.all([loadEvents(),loadRic()]);
  render();
  loadWeather();
}
init();
</script>
</body>
</html>
